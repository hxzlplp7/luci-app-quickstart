<%+header%>
<!-- 使用本地资源实现 100% 离线 -->
<script src="/luci-static/dashboard/tailwindcss.js"></script>
<script src="/luci-static/dashboard/chart.js"></script>
<script src="/luci-static/dashboard/lucide.js"></script>

<style>
    /* 继承用户提供的深色皮肤滚动条与基础样式 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e1e24; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .chart-center-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
</style>

<script>
    // 注入用户提供的 Tailwind 配置
    window.tailwind.config = {
        theme: {
            extend: {
                colors: {
                    bgBase: '#1c1d21', bgPanel: '#24252b', bgHover: '#2d2e34',
                    textMain: '#d1d5db', textMuted: '#9ca3af', borderMain: '#374151',
                    accentGreen: '#10b981', accentBlue: '#3b82f6', accentPurple: '#8b5cf6',
                    accentOrange: '#f97316', accentCyan: '#06b6d4'
                },
                fontSize: { 'xxs': '0.65rem' }
            }
        }
    }
</script>

<div class="bg-bgBase text-textMain min-h-[calc(100vh-120px)] flex flex-col p-4 rounded-xl overflow-y-auto">
    <!-- 头部面包屑 -->
    <div class="flex items-center gap-2 text-xs text-textMuted mb-4">
        <i data-lucide="home" class="w-3 h-3"></i>
        <span>></span>
        <span>仪表板</span>
    </div>

    <!-- 主布局网格 -->
    <div class="flex flex-col lg:flex-row gap-4">
        
        <!-- 左侧/中间 主内容区 -->
        <div class="flex-1 flex flex-col gap-4 min-w-0">
            
            <!-- 指标行 -->
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                <div class="bg-bgPanel rounded p-4 flex flex-col justify-center border border-borderMain">
                    <div class="text-xs text-textMuted mb-1">联网状态</div>
                    <div class="text-accentGreen font-semibold text-sm" id="wan-status-text">检测中...</div>
                </div>
                <div class="bg-bgPanel rounded p-4 flex flex-col justify-center border border-borderMain">
                    <div class="text-xs text-textMuted mb-1">在线设备</div>
                    <div class="text-gray-200 font-semibold text-xl" id="active-device-count">0</div>
                </div>
                <div class="bg-bgPanel rounded p-4 flex flex-col justify-center border border-borderMain">
                    <div class="text-xs text-textMuted mb-1">连接数</div>
                    <div class="text-gray-200 font-semibold text-xl" id="conn-count">-</div>
                </div>
                <div class="bg-bgPanel rounded p-4 flex flex-col justify-center border border-borderMain">
                    <div class="text-xs text-textMuted mb-1">累计下载</div>
                    <div class="text-gray-200 font-semibold text-sm truncate" id="total-down">-</div>
                </div>
                <div class="bg-bgPanel rounded p-4 flex flex-col justify-center border border-borderMain">
                    <div class="text-xs text-textMuted mb-1">累计上传</div>
                    <div class="text-gray-200 font-semibold text-sm truncate" id="total-up">-</div>
                </div>
            </div>

            <!-- 流量统计图表 -->
            <div class="bg-bgPanel rounded p-4 border border-borderMain flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-sm font-medium text-gray-200 flex items-center gap-2">
                        <i data-lucide="activity" class="w-4 h-4 text-accentGreen"></i>
                        流量统计(wan)
                    </h3>
                </div>
                <div class="h-64 w-full relative">
                    <canvas id="trafficChart"></canvas>
                </div>
                <div class="flex justify-center gap-6 mt-4 text-[10px] text-textMuted font-mono">
                    <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-accentGreen"></span> 下行: <span id="cur-down-speed">0 KB/s</span></span>
                    <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-accentBlue"></span> 上行: <span id="cur-up-speed">0 KB/s</span></span>
                </div>
            </div>

            <!-- OAF 活跃应用与特征库更新 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-bgPanel rounded p-4 border border-borderMain">
                    <h3 class="text-sm font-medium text-gray-200 mb-4 flex items-center gap-2">
                        <i data-lucide="layout-grid" class="w-4 h-4 text-accentPurple"></i>
                        活跃APP
                    </h3>
                    <div class="flex flex-wrap gap-x-6 gap-y-4" id="oaf-apps-list">
                        <!-- Mock Apps for Visuals -->
                        <div class="flex flex-col items-center gap-1 w-10">
                            <div class="w-8 h-8 rounded bg-green-500 flex items-center justify-center text-white"><i data-lucide="play" class="w-4 h-4"></i></div>
                            <span class="text-xxs text-textMuted truncate w-full text-center">视频</span>
                        </div>
                        <div class="flex flex-col items-center gap-1 w-10">
                            <div class="w-8 h-8 rounded bg-blue-500 flex items-center justify-center text-white"><i data-lucide="message-square" class="w-4 h-4"></i></div>
                            <span class="text-xxs text-textMuted truncate w-full text-center">社交</span>
                        </div>
                    </div>
                </div>

                <!-- OAF 特征库更新 -->
                <div class="bg-bgPanel rounded p-4 border border-borderMain flex flex-col">
                    <h3 class="text-sm font-medium text-gray-200 mb-4 flex items-center gap-2">
                        <i data-lucide="shield-check" class="w-4 h-4 text-accentOrange"></i>
                        OAF 特征库
                    </h3>
                    <div class="space-y-2 text-xs mb-4">
                        <div class="flex justify-between"><span class="text-textMuted">版本</span><span class="text-gray-300" id="oaf-version">-</span></div>
                        <div class="flex justify-between"><span class="text-textMuted">引擎</span><span class="text-gray-300" id="oaf-engine">-</span></div>
                    </div>
                    <div class="mt-auto space-y-3">
                        <label class="block">
                            <input type="file" title="选择特征库文件" id="oaf-file-input" class="block w-full text-[10px] text-textMuted
                              file:mr-2 file:py-1 file:px-3
                              file:rounded-full file:border-0
                              file:text-xxs file:font-semibold
                              file:bg-bgHover file:text-accentOrange
                              cursor-pointer
                            "/>
                        </label>
                        <button id="oaf-upload-btn" class="w-full py-1.5 bg-accentOrange hover:bg-orange-600 text-white text-xs rounded transition-colors flex items-center justify-center gap-2">
                            <i data-lucide="upload" class="w-3 h-3"></i> 立即更新
                        </button>
                        <div id="oaf-progress-container" class="hidden">
                            <div class="w-full bg-bgBase h-1 rounded overflow-hidden">
                                <div id="oaf-bar" class="bg-accentBlue h-full w-0 transition-all duration-300"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 分布图表排 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-bgPanel rounded p-4 border border-borderMain flex flex-col h-64">
                    <h3 class="text-sm font-medium text-gray-200 mb-2">APP 统计分布</h3>
                    <div class="flex-1 relative">
                        <canvas id="appUsageChart"></canvas>
                    </div>
                </div>
                <div class="bg-bgPanel rounded p-4 border border-borderMain flex flex-col h-64">
                    <h3 class="text-sm font-medium text-gray-200 mb-2">活跃域名</h3>
                    <div class="flex-1 overflow-y-auto space-y-2" id="domains-list">
                    </div>
                </div>
            </div>

        </div>

        <!-- 右侧 系统面板区 -->
        <div class="w-full lg:w-72 flex flex-col gap-4 shrink-0">
            
            <!-- 系统信息 -->
            <div class="bg-bgPanel rounded p-4 border border-borderMain">
                <h3 class="text-sm font-medium text-gray-200 mb-3 border-b border-borderMain pb-2">系统信息</h3>
                <div class="space-y-2 text-xs">
                    <div class="flex justify-between"><span class="text-textMuted">主机名</span><span class="text-gray-300" id="sys-hostname">-</span></div>
                    <div class="flex justify-between"><span class="text-textMuted">设备型号</span><span class="text-gray-300" id="sys-model">-</span></div>
                    <div class="flex justify-between"><span class="text-textMuted">固件版本</span><span class="text-gray-300 font-mono" id="sys-firmware">-</span></div>
                    <div class="flex justify-between"><span class="text-textMuted">内核版本</span><span class="text-gray-300 font-mono" id="sys-kernel">-</span></div>
                    <div class="flex justify-between"><span class="text-textMuted">运行时间</span><span class="text-gray-300" id="sys-uptime">-</span></div>
                </div>
            </div>

            <!-- 运行状态 Dials -->
            <div class="bg-bgPanel rounded p-4 border border-borderMain">
                <h3 class="text-sm font-medium text-gray-200 mb-3 border-b border-borderMain pb-2">运行状态</h3>
                <div class="flex justify-around items-center pt-2">
                    <div class="relative w-16 h-16">
                        <canvas id="cpuDial"></canvas>
                        <div class="chart-center-text text-[10px] text-gray-200" id="cpu-text">0%</div>
                        <div class="text-center text-xxs text-textMuted mt-1 absolute -bottom-5 w-full">CPU</div>
                    </div>
                    <div class="relative w-16 h-16">
                        <canvas id="memDial"></canvas>
                        <div class="chart-center-text text-[10px] text-gray-200" id="mem-text">0%</div>
                        <div class="text-center text-xxs text-textMuted mt-1 absolute -bottom-5 w-full">内存</div>
                    </div>
                </div>
                <div class="h-6"></div>
            </div>

            <!-- 温度 -->
            <div class="bg-bgPanel rounded p-4 border border-borderMain">
                <h3 class="text-sm font-medium text-gray-200 mb-3 border-b border-borderMain pb-2">温度</h3>
                <div class="flex items-center justify-between text-xs mb-1">
                    <span class="text-textMuted">CPU</span>
                    <span class="text-gray-300" id="cpu-temp">-</span>
                </div>
                <div class="w-full bg-bgBase rounded-full h-1 border border-borderMain overflow-hidden">
                    <div id="temp-bar" class="bg-accentOrange h-full transition-all duration-500 w-0"></div>
                </div>
            </div>

            <!-- 网络面板 -->
            <div class="bg-bgPanel rounded p-4 border border-borderMain">
                <h3 class="text-sm font-medium text-gray-200 mb-3 border-b border-borderMain pb-2">网络</h3>
                <div class="space-y-2 text-xs">
                    <div class="flex justify-between"><span class="text-textMuted">LAN IP</span><span class="text-gray-300" id="lan-ip">-</span></div>
                    <div class="flex justify-between"><span class="text-textMuted">WAN IP</span><span class="text-gray-300" id="wan-ip">-</span></div>
                </div>
            </div>

            <!-- 在线设备简表 -->
            <div class="bg-bgPanel rounded p-4 border border-borderMain flex-1">
                <h3 class="text-sm font-medium text-gray-200 mb-3 border-b border-borderMain pb-2">在线设备</h3>
                <div class="space-y-2 overflow-y-auto max-h-48" id="devices-list">
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const API_BASE = '<%=url("admin/dashboard/api")%>';
    const API_OAF = '<%=url("admin/dashboard/api/oaf")%>'; // 适配统一路由映射
    const LUCI_TOKEN = (window.L && L.env && L.env.token) ? L.env.token : '';

    // 基础工具与安全性增强
    const escapeHtml = (str) => {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    };

    const formatBytes = (bytes) => {
        if (!bytes || bytes === 0) return '0 B';
        const k = 1024, sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    };
    const formatUptime = (s) => {
        if (!s) return '-';
        const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
        return `${d > 0 ? d + 'd ' : ''}${h}h ${m}m`;
    };
    async function apiRequest(ep, base = API_BASE) {
        try { const res = await fetch(`${base}/${ep}`, { credentials: 'same-origin' }); return res.ok ? await res.json() : null; } catch (e) { return null; }
    }

    // Chart.js 全局配置
    Chart.defaults.color = '#9ca3af';
    Chart.defaults.borderColor = '#374151';

    // 1. 流量图表
    const trafficCtx = document.getElementById('trafficChart').getContext('2d');
    const MAX_POINTS = 40;
    let trafficLabels = Array(MAX_POINTS).fill('');
    let dataDown = Array(MAX_POINTS).fill(0);
    let dataUp = Array(MAX_POINTS).fill(0);

    const trafficChart = new Chart(trafficCtx, {
        type: 'line',
        data: {
            labels: trafficLabels,
            datasets: [
                { label: '下行', data: dataDown, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2 },
                { label: '上行', data: dataUp, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2 }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { display: false }, y: { grid: { color: '#2d2e34' }, ticks: { font: { size: 10 } } } },
            animation: false
        }
    });

    let prevTx = 0, prevRx = 0, prevTime = 0;
    async function refreshTraffic() {
        const data = await apiRequest('traffic');
        if (data) {
            const now = Date.now();
            if (prevTime !== 0) {
                const diff = Math.max((now - prevTime) / 1000, 1);
                if (data.tx_bytes < prevTx || data.rx_bytes < prevRx) {
                    prevTx = data.tx_bytes; prevRx = data.rx_bytes; prevTime = now;
                    return;
                }
                const upSpeed = Math.max(0, (data.tx_bytes - prevTx) / diff);
                const downSpeed = Math.max(0, (data.rx_bytes - prevRx) / diff);
                dataUp.push(upSpeed); dataDown.push(downSpeed);
                dataUp.shift(); dataDown.shift();
                trafficChart.update();
                document.getElementById('cur-up-speed').innerText = formatBytes(upSpeed) + '/s';
                document.getElementById('cur-down-speed').innerText = formatBytes(downSpeed) + '/s';
            }
            document.getElementById('total-up').innerText = formatBytes(data.tx_bytes);
            document.getElementById('total-down').innerText = formatBytes(data.rx_bytes);
            prevTx = data.tx_bytes; prevRx = data.rx_bytes; prevTime = now;
        }
    }

    // 2. Dials (CPU/Mem)
    const cpuDial = new Chart(document.getElementById('cpuDial').getContext('2d'), {
        type: 'doughnut', data: { datasets: [{ data: [0, 100], backgroundColor: ['#10b981', '#2d2e34'], borderWidth: 0 }] },
        options: { responsive: true, cutout: '85%', plugins: { tooltip: false } }
    });
    const memDial = new Chart(document.getElementById('memDial').getContext('2d'), {
        type: 'doughnut', data: { datasets: [{ data: [0, 100], backgroundColor: ['#3b82f6', '#2d2e34'], borderWidth: 0 }] },
        options: { responsive: true, cutout: '85%', plugins: { tooltip: false } }
    });

    // 3. App Usage / Distribution
    const appUsageChart = new Chart(document.getElementById('appUsageChart').getContext('2d'), {
        type: 'doughnut', data: { labels: ['视频', '下载', '聊天', '购物'], datasets: [{ data: [40, 30, 20, 10], backgroundColor: ['#10b981','#8b5cf6','#3b82f6','#f97316'], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: { size: 10 } } } } }
    });

    // 4. Data Loading
    async function loadSysInfo() {
        const data = await apiRequest('sysinfo');
        if (data) {
            document.getElementById('sys-hostname').innerText = data.hostname || '-';
            document.getElementById('sys-model').innerText = data.model || '-';
            document.getElementById('sys-firmware').innerText = data.firmware;
            document.getElementById('sys-kernel').innerText = data.kernel;
            document.getElementById('sys-uptime').innerText = formatUptime(data.uptime_raw);
            document.getElementById('cpu-text').innerText = data.cpuUsage + '%';
            cpuDial.data.datasets[0].data = [data.cpuUsage, 100 - data.cpuUsage]; cpuDial.update();
            document.getElementById('mem-text').innerText = data.memUsage + '%';
            memDial.data.datasets[0].data = [data.memUsage, 100 - data.memUsage]; memDial.update();
            document.getElementById('cpu-temp').innerText = (data.temp > 0 ? data.temp + '°C' : '-');
            document.getElementById('temp-bar').style.width = Math.min(data.temp, 100) + '%';
        }
    }

    async function loadNetInfo() {
        const data = await apiRequest('netinfo');
        if (data) {
            const statusText = document.getElementById('wan-status-text');
            if (data.wanStatus === 'up') {
                statusText.innerText = '已联网';
                statusText.className = 'text-accentGreen font-semibold text-sm';
            } else {
                statusText.innerText = '未连接';
                statusText.className = 'text-red-500 font-semibold text-sm';
            }
            document.getElementById('lan-ip').innerText = data.lanIp || '-';
            document.getElementById('wan-ip').innerText = data.wanIp || '-';
            if (document.getElementById('conn-count')) {
                document.getElementById('conn-count').innerText = data.connCount || '-';
            }
        }
    }

    async function loadDevices() {
        const devices = await apiRequest('devices');
        if (!devices) return;
        document.getElementById('active-device-count').innerText = devices.filter(d => d.active).length;
        const html = devices.slice(0, 10).map(dev => `
            <div class="flex items-center justify-between text-xxs group">
                <span class="text-gray-400 truncate w-32" title="${escapeHtml(dev.name || dev.mac)}">${escapeHtml(dev.name || dev.mac)}</span>
                <span class="text-textMuted font-mono">${escapeHtml(dev.ip)}</span>
                <span class="w-1.5 h-1.5 rounded-full ${dev.active ? 'bg-accentGreen' : 'bg-gray-600'}"></span>
            </div>
        `).join('');
        document.getElementById('devices-list').innerHTML = html;
        lucide.createIcons();
    }

    async function loadDomains() {
        const data = await apiRequest('domains');
        if (!data || !data.top) return;
        const max = data.top[0] ? data.top[0].count : 1;
        const html = data.top.slice(0, 8).map(item => `
            <div class="space-y-1">
                <div class="flex justify-between text-xxs"><span class="truncate w-40 font-mono" title="${escapeHtml(item.domain)}">${escapeHtml(item.domain)}</span><span class="text-accentBlue">${item.count}</span></div>
                <div class="w-full bg-bgBase h-0.5"><div class="bg-accentBlue h-full" style="width: ${(item.count/max)*100}%"></div></div>
            </div>
        `).join('');
        document.getElementById('domains-list').innerHTML = html;
    }

    async function loadOafStatus() {
        // 合并请求：从 status 接口同时获取版本和活跃 APP
        const data = await apiRequest('status', API_OAF);
        const listEl = document.getElementById('oaf-apps-list');
        if (data) {
            document.getElementById('oaf-version').innerText = data.current_version || '-';
            document.getElementById('oaf-engine').innerText = data.engine || '-';

            if (data.class_stats && data.class_stats.length > 0) {
                appUsageChart.data.labels = data.class_stats.map(item => item.name || '-');
                appUsageChart.data.datasets[0].data = data.class_stats.map(item => item.time || 0);
                appUsageChart.update();
            }

            // 动态加载活跃 APP 列表 (基于 backend 返回的 active_apps)
            if (data.active_apps && data.active_apps.length > 0) {
                const colors = ['bg-green-500', 'bg-blue-500', 'bg-purple-500', 'bg-orange-500', 'bg-cyan-500'];
                const icons = ['play', 'message-square', 'download', 'shopping-cart', 'globe'];
                listEl.innerHTML = data.active_apps.slice(0, 10).map((app, i) => `
                    <div class="flex flex-col items-center gap-1 w-10 group cursor-help" title="${escapeHtml(app.name)}">
                        <div class="w-8 h-8 rounded ${colors[i % colors.length]} flex items-center justify-center text-white shadow-sm group-hover:scale-110 transition-transform">
                            <i data-lucide="${icons[i % icons.length]}" class="w-4 h-4"></i>
                        </div>
                        <span class="text-xxs text-textMuted truncate w-full text-center">${escapeHtml(app.name)}</span>
                    </div>
                `).join('');
                lucide.createIcons();
            } else if (listEl) {
                listEl.innerHTML = '<span class="text-xxs text-textMuted italic">暂无活跃应用数据</span>';
            }
        }
    }

    async function uploadOafFeature() {
        const fileInput = document.getElementById('oaf-file-input');
        if (!fileInput || !fileInput.files[0]) return;
        
        const file = fileInput.files[0];
        // 1. 前端体积预检 (与后端 32MB 限制同步)
        if (file.size > 32 * 1024 * 1024) {
            alert('文件过大：特征库文件不能超过 32MB');
            return;
        }
        // 2. 格式预检
        if (!file.name.match(/\.(bin|zip)$/i)) {
            alert('文件格式错误：请上传 .bin 或 .zip 格式的特征库');
            return;
        }

        const formData = new FormData();
        formData.append('token', LUCI_TOKEN);
        formData.append('file', file);
        const btn = document.getElementById('oaf-upload-btn');
        const progress = document.getElementById('oaf-progress-container');
        const bar = document.getElementById('oaf-bar');
        
        btn.disabled = true; 
        btn.innerHTML = '<i data-lucide="loader-2" class="w-3 h-3 animate-spin"></i> 处理中...';
        lucide.createIcons();
        progress.classList.remove('hidden');

        const xhr = new XMLHttpRequest(); 
        xhr.open('POST', `${API_OAF}/upload`, true);
        xhr.upload.onprogress = (e) => { 
            if (e.lengthComputable) { bar.style.width = Math.round((e.loaded/e.total)*100) + '%'; } 
        };
        xhr.onload = () => { 
            let res = { success: false, message: '服务器响应异常' };
            try { res = JSON.parse(xhr.responseText); } catch(e) {}
            
            if (xhr.status === 200 && res.success) {
                btn.innerHTML = '<i data-lucide="check-circle" class="w-3 h-3"></i> 更新成功';
                lucide.createIcons();
                setTimeout(() => location.reload(), 1500); 
            } else {
                alert('上传失败: ' + (res.message || '未知错误'));
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="upload" class="w-3 h-3"></i> 立即更新';
                progress.classList.add('hidden');
                bar.style.width = '0%';
                lucide.createIcons();
            }
        };
        xhr.onerror = () => {
            alert('网络请求失败，请检查连接');
            btn.disabled = false;
            btn.innerHTML = '<i data-lucide="upload" class="w-3 h-3"></i> 立即更新';
            progress.classList.add('hidden');
            lucide.createIcons();
        };
        xhr.send(formData);
    }

    // 初始化与事件绑定
    window.addEventListener('load', () => {
        refreshTraffic();
        loadSysInfo(); 
        loadNetInfo(); 
        loadDevices(); 
        loadDomains(); 
        loadOafStatus();

        // 绑定上传按钮 (CSP Safe)
        const uploadBtn = document.getElementById('oaf-upload-btn');
        if (uploadBtn) {
            uploadBtn.addEventListener('click', uploadOafFeature);
        }

        lucide.createIcons();
    });

    setInterval(refreshTraffic, 3000);
    setInterval(loadDevices, 15000);
</script>
<%+footer%>
