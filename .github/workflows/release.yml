name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PKG_NAME: luci-app-dashboard
  SDK_ARCH: mediatek-filogic-24.10.5

jobs:
  build:
    name: Build dashboard packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare local feed layout
        run: |
          rm -rf .feed
          mkdir -p .feed/${{ env.PKG_NAME }}
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.feed' \
            ./ ./.feed/${{ env.PKG_NAME }}/

      - name: Build LuCI packages
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ env.SDK_ARCH }}
          FEED_DIR: ${{ github.workspace }}/.feed
          PACKAGES: luci-app-dashboard dashboard-core
          NO_REFRESH_CHECK: true

      - name: Collect release assets
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist

          echo "All built IPKs:"
          find bin -type f -name '*.ipk' | sort

          app_ipk="$(find bin -type f -name 'luci-app-dashboard_*.ipk' | sort | head -n 1)"
          i18n_ipk="$(find bin -type f -name 'luci-i18n-dashboard-zh-cn_*.ipk' | sort | head -n 1)"
          core_ipk="$(find bin -type f -name 'dashboard-core_*.ipk' | sort | head -n 1)"

          test -n "$app_ipk" || (echo "Missing luci-app-dashboard ipk" && exit 1)
          test -n "$i18n_ipk" || (echo "Missing luci-i18n-dashboard-zh-cn ipk" && exit 1)
          test -n "$core_ipk" || (echo "Missing dashboard-core ipk" && exit 1)

          cp -f "$app_ipk" dist/luci-app-dashboard.ipk
          cp -f "$i18n_ipk" dist/luci-i18n-dashboard-zh-cn.ipk
          cp -f install.sh dist/install.sh

          workdir="$(mktemp -d)"
          core_ipk_abs="$(readlink -f "$core_ipk")"
          (
            cd "$workdir"
            ar x "$core_ipk_abs"
            core_arch="$(tar -xOzf control.tar.gz ./control | awk -F ': ' '$1 == "Architecture" { print $2; exit }')"
            test -n "$core_arch" || (echo "Missing dashboard-core architecture metadata" && exit 1)
            tar -xOzf data.tar.gz ./usr/bin/dashboard-core > "${GITHUB_WORKSPACE}/dist/dashboard-core-${core_arch}"
          )
          rm -rf "$workdir"

          chmod 755 dist/install.sh dist/dashboard-core-*

          echo "Release assets:"
          ls -lah dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-release-assets
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dashboard-release-assets
          path: dist

      - name: Show release files
        run: |
          set -euo pipefail
          ls -lah dist

          test -f dist/install.sh || (echo "Missing install.sh" && exit 1)
          test -f dist/luci-app-dashboard.ipk || (echo "Missing luci-app-dashboard.ipk" && exit 1)
          test -f dist/luci-i18n-dashboard-zh-cn.ipk || (echo "Missing luci-i18n-dashboard-zh-cn.ipk" && exit 1)
          compgen -G "dist/dashboard-core-*" >/dev/null || (echo "Missing dashboard-core assets" && exit 1)
          ! compgen -G "dist/kmod-dashboard-monitor_*.ipk" >/dev/null || (echo "kmod assets must not be released" && exit 1)

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
