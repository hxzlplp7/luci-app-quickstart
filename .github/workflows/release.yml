name: Build and Release IPK

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build OpenWrt Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare local feed layout
        run: |
          rm -rf .feed
          mkdir -p .feed/luci-app-dashboard
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.feed' \
            ./ ./.feed/luci-app-dashboard/

      - name: Build Package
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-23.05.5
          FEED_DIR: ${{ github.workspace }}/.feed
          PACKAGES: luci-app-dashboard
          NO_REFRESH_CHECK: true

      - name: Upload IPK to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: bin/packages/*/action/*.ipk
