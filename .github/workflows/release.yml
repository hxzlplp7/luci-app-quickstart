name: Build and Release IPK

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PKG_NAME: luci-app-dashboard
  PKG_LIST: luci-app-dashboard kmod-dashboard-monitor
  PRIMARY_ARCH: x86_64-21.02.7

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64-21.02.7
          - arm_cortex-a7_neon-vfpv4-21.02.7
          - aarch64_cortex-a53-21.02.7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare local feed layout
        run: |
          rm -rf .feed
          mkdir -p .feed/${{ env.PKG_NAME }}
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.feed' \
            ./ ./.feed/${{ env.PKG_NAME }}/

      - name: Build Package
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}
          FEED_DIR: ${{ github.workspace }}/.feed
          PACKAGES: ${{ env.PKG_LIST }}
          NO_REFRESH_CHECK: true

      - name: Collect Release IPKs
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist

          echo "All built IPKs:"
          find bin -type f -name '*.ipk' | sort || true

          if [ "${{ matrix.arch }}" = "${{ env.PRIMARY_ARCH }}" ]; then
            find bin -type f -name 'luci-app-dashboard_*.ipk' -exec cp -f {} dist/ \;
            find bin -type f -name 'luci-i18n-dashboard-zh-cn_*.ipk' -exec cp -f {} dist/ \;
          fi

          find bin -type f -name 'kmod-dashboard-monitor_*.ipk' -exec cp -f {} dist/ \;

          echo "Release IPKs:"
          ls -lah dist || true

          ls dist/kmod-dashboard-monitor_*.ipk >/dev/null 2>&1 || (echo "Missing kmod-dashboard-monitor ipk for ${{ matrix.arch }}" && exit 1)

          if [ "${{ matrix.arch }}" = "${{ env.PRIMARY_ARCH }}" ]; then
            ls dist/luci-app-dashboard_*.ipk >/dev/null 2>&1 || (echo "Missing luci-app-dashboard ipk" && exit 1)
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-packages-${{ matrix.arch }}
          path: dist/*.ipk
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dashboard-packages-*
          path: dist
          merge-multiple: true

      - name: Show Release Files
        run: |
          set -euo pipefail
          ls -lah dist
          find dist -maxdepth 1 -type f -name '*.ipk' | sort

          ls dist/luci-app-dashboard_*.ipk >/dev/null 2>&1 || (echo "Missing luci-app-dashboard ipk in release stage" && exit 1)
          ls dist/kmod-dashboard-monitor_*.ipk >/dev/null 2>&1 || (echo "Missing kmod-dashboard-monitor ipk in release stage" && exit 1)

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.ipk
          generate_release_notes: true
