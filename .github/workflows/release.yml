name: Build and Release IPK

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PKG_NAME: luci-app-dashboard

jobs:
  build:
    name: Build OpenWrt Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare local feed layout
        run: |
          rm -rf .feed
          mkdir -p .feed/${{ env.PKG_NAME }}
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.feed' \
            ./ ./.feed/${{ env.PKG_NAME }}/

      - name: Install Host Validators
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run Host Checks
        run: |
          lua5.1 tests/lua/run.lua tests/lua/test_response.lua
          lua5.1 tests/lua/run.lua tests/lua/test_validation.lua
          lua5.1 tests/lua/run.lua tests/lua/test_overview.lua
          lua5.1 tests/lua/run.lua tests/lua/test_users.lua
          lua5.1 tests/lua/run.lua tests/lua/test_network.lua
          lua5.1 tests/lua/run.lua tests/lua/test_network_source.lua
          lua5.1 tests/lua/run.lua tests/lua/test_record.lua
          lua5.1 tests/lua/run.lua tests/lua/test_feature.lua
          node --test tests/js/overview.test.mjs tests/js/shell.test.mjs tests/js/users.test.mjs tests/js/api.test.mjs tests/js/record.test.mjs tests/js/app-record.test.mjs tests/js/feature.test.mjs
          node --check htdocs/luci-static/dashboard/app.js
          node --check htdocs/luci-static/dashboard/api.js
          node --check htdocs/luci-static/dashboard/shell.js
          node --check htdocs/luci-static/dashboard/sections-overview.js
          node --check htdocs/luci-static/dashboard/sections-users.js
          node --check htdocs/luci-static/dashboard/sections-network.js
          node --check htdocs/luci-static/dashboard/sections-system.js
          node --check htdocs/luci-static/dashboard/sections-record.js
          node --check htdocs/luci-static/dashboard/sections-feature.js
          node --check htdocs/luci-static/dashboard/sections-settings.js

      - name: Build Package
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-21.02.7
          FEED_DIR: ${{ github.workspace }}/.feed
          PACKAGES: ${{ env.PKG_NAME }}
          NO_REFRESH_CHECK: true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-ipk
          path: bin/packages/*/action/*.ipk

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: bin/packages/*/action/*.ipk
          generate_release_notes: true
