name: Build and Release IPK

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PKG_NAME: luci-app-dashboard
  PKG_LIST: luci-app-dashboard kmod-dashboard-monitor

jobs:
  build:
    name: Build OpenWrt Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare local feed layout
        run: |
          rm -rf .feed
          mkdir -p .feed/${{ env.PKG_NAME }}
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.feed' \
            ./ ./.feed/${{ env.PKG_NAME }}/

      - name: Build Package
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-21.02.7
          FEED_DIR: ${{ github.workspace }}/.feed
          PACKAGES: ${{ env.PKG_LIST }}
          NO_REFRESH_CHECK: true

      - name: Collect Release IPKs
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist

          echo "All built IPKs:"
          find bin -type f -name '*.ipk' | sort || true

          find bin -type f -name 'luci-app-dashboard_*.ipk' -exec cp -f {} dist/ \;
          find bin -type f -name 'luci-i18n-dashboard-zh-cn_*.ipk' -exec cp -f {} dist/ \;
          find bin -type f -name 'kmod-dashboard-monitor_*.ipk' -exec cp -f {} dist/ \;

          echo "Release IPKs:"
          ls -lah dist

          ls dist/luci-app-dashboard_*.ipk >/dev/null 2>&1 || (echo "Missing luci-app-dashboard ipk" && exit 1)
          ls dist/kmod-dashboard-monitor_*.ipk >/dev/null 2>&1 || (echo "Missing kmod-dashboard-monitor ipk" && exit 1)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-packages-ipk
          path: dist/*.ipk

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.ipk
          generate_release_notes: true
