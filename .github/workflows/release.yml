name: Build and Release IPK

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PKG_NAME: luci-app-dashboard

jobs:
  build:
    name: Build ${{ matrix.sdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sdk: mediatek-filogic-23.05.0
            primary: false
            packages: kmod-dashboard-monitor
          - sdk: mediatek-filogic-23.05.1
            primary: false
            packages: kmod-dashboard-monitor
          - sdk: mediatek-filogic-23.05.2
            primary: false
            packages: kmod-dashboard-monitor
          - sdk: mediatek-filogic-23.05.3
            primary: false
            packages: kmod-dashboard-monitor
          - sdk: mediatek-filogic-23.05.4
            primary: false
            packages: kmod-dashboard-monitor
          - sdk: mediatek-filogic-23.05.5
            primary: false
            packages: kmod-dashboard-monitor
          - sdk: mediatek-filogic-23.05.6
            primary: false
            packages: kmod-dashboard-monitor
          - sdk: mediatek-filogic-24.10.0
            primary: false
            packages: kmod-dashboard-monitor
          - sdk: mediatek-filogic-24.10.1
            primary: false
            packages: kmod-dashboard-monitor
          - sdk: mediatek-filogic-24.10.2
            primary: false
            packages: kmod-dashboard-monitor
          - sdk: mediatek-filogic-24.10.3
            primary: false
            packages: kmod-dashboard-monitor
          - sdk: mediatek-filogic-24.10.4
            primary: false
            packages: kmod-dashboard-monitor
          - sdk: mediatek-filogic-24.10.5
            primary: true
            packages: luci-app-dashboard kmod-dashboard-monitor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare local feed layout
        run: |
          rm -rf .feed
          mkdir -p .feed/${{ env.PKG_NAME }}
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.feed' \
            ./ ./.feed/${{ env.PKG_NAME }}/

      - name: Build Package
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.sdk }}
          FEED_DIR: ${{ github.workspace }}/.feed
          PACKAGES: ${{ matrix.packages }}
          NO_REFRESH_CHECK: true

      - name: Collect Release IPKs
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist

          echo "All built IPKs:"
          find bin -type f -name '*.ipk' | sort || true

          if [ "${{ matrix.primary }}" = "true" ]; then
            find bin -type f -name 'luci-app-dashboard_*.ipk' -exec cp -f {} dist/ \;
            find bin -type f -name 'luci-i18n-dashboard-zh-cn_*.ipk' -exec cp -f {} dist/ \;
          fi

          while IFS= read -r file; do
            base="$(basename "$file" .ipk)"
            cp -f "$file" "dist/${base}_${{ matrix.sdk }}.ipk"
          done < <(find bin -type f -name 'kmod-dashboard-monitor_*.ipk' | sort)

          echo "Release IPKs:"
          ls -lah dist || true

          ls dist/kmod-dashboard-monitor_*_${{ matrix.sdk }}.ipk >/dev/null 2>&1 || (echo "Missing kmod-dashboard-monitor ipk for ${{ matrix.sdk }}" && exit 1)

          if [ "${{ matrix.primary }}" = "true" ]; then
            ls dist/luci-app-dashboard_*.ipk >/dev/null 2>&1 || (echo "Missing luci-app-dashboard ipk" && exit 1)
            ls dist/luci-i18n-dashboard-zh-cn_*.ipk >/dev/null 2>&1 || (echo "Missing luci-i18n-dashboard-zh-cn ipk" && exit 1)
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-packages-${{ matrix.sdk }}
          path: dist/*.ipk
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dashboard-packages-*
          path: dist
          merge-multiple: true

      - name: Show Release Files
        run: |
          set -euo pipefail
          ls -lah dist
          find dist -maxdepth 1 -type f -name '*.ipk' | sort

          ls dist/luci-app-dashboard_*.ipk >/dev/null 2>&1 || (echo "Missing luci-app-dashboard ipk in release stage" && exit 1)
          ls dist/luci-i18n-dashboard-zh-cn_*.ipk >/dev/null 2>&1 || (echo "Missing luci-i18n-dashboard-zh-cn ipk in release stage" && exit 1)
          ls dist/kmod-dashboard-monitor_*.ipk >/dev/null 2>&1 || (echo "Missing kmod-dashboard-monitor ipk in release stage" && exit 1)

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.ipk
          generate_release_notes: true
